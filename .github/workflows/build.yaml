name: Test Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Test build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build add-on
        uses: home-assistant/builder@master
        with:
          args: |
            --test \
            --all \
            --target cgate-server \
            --docker-hub ghcr.io/rbhr
